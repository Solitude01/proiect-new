<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>预警列表</title>
</head>
<body>
<h2>最近 10 条预警</h2>

<table border="1" cellpadding="6">
  <tr>
    <th>时间</th>
    <th>设备</th>
    <th>等级</th>
    <th>状态</th>
    <th>操作</th>
  </tr>
  {% for a in alarms %}
  <tr>
    <td>{{ a.updated_at }}</td>
    <td>{{ a.device_name }}</td>
    <td>{{ a.level }}</td>
    <td>{{ a.status }}</td>
    <td><a href="/alarm/{{ a.alarm_id }}">查看</a></td>
  </tr>
  {% endfor %}
</table>

</body>
</html>
