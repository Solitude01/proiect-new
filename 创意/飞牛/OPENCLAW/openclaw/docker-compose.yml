services:
  openclaw-gateway:
    image: alpine/openclaw:latest
    container_name: openclaw_gateway
    init: true
    expose:
      - "18789"
      - "18790"
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: "0"
      OPENAI_API_BASE: http://ds.scc.com.cn/v1
      DEFAULT_MODEL: ds-v3
      HTTP_PROXY: http://10.30.44.154:1111
      http_proxy: http://10.30.44.154:1111
      HTTPS_PROXY: http://10.30.44.154:1111
      https_proxy: http://10.30.44.154:1111
      NO_PROXY: localhost,127.0.0.1,10.30.43.0/24,ds.scc.com.cn
      no_proxy: localhost,127.0.0.1,10.30.43.0/24,ds.scc.com.cn
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: openclaw_nginx
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - openclaw-gateway
    restart: unless-stopped
