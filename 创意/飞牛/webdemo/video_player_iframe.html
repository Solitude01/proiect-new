<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC 深南电路 华东智能制造推进部 2026年会</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "SimHei", -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #1A0000 0%, #3D0000 50%, #1A0000 100%);
            min-height: 100vh;
            padding: 30px 20px;
            overflow-x: hidden;
            color: #FFD700;
        }

        /* ===== Canvas 背景层 ===== */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 灯笼 ===== */
        .lantern {
            position: fixed;
            top: -10px;
            z-index: 1;
            animation: lanternSwing 3s ease-in-out infinite;
        }
        .lantern.left { left: 30px; animation-delay: 0s; }
        .lantern.right { right: 30px; animation-delay: 1.5s; }

        @keyframes lanternSwing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .lantern-line {
            width: 2px;
            height: 40px;
            background: #FFD700;
            margin: 0 auto;
        }
        .lantern-top {
            width: 40px;
            height: 8px;
            background: #FFD700;
            border-radius: 3px 3px 0 0;
            margin: 0 auto;
        }
        .lantern-body {
            width: 60px;
            height: 70px;
            background: radial-gradient(ellipse at center, #FF4500 0%, #C41E24 60%, #8B0000 100%);
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.6), inset 0 0 15px rgba(255, 200, 0, 0.3);
        }
        .lantern-body::before {
            content: "福";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.8);
        }
        .lantern-bottom {
            width: 40px;
            height: 8px;
            background: #FFD700;
            border-radius: 0 0 3px 3px;
            margin: 0 auto;
        }
        .lantern-tassel {
            width: 2px;
            height: 20px;
            background: #FFD700;
            margin: 0 auto;
        }
        .lantern-tassel::after {
            content: "";
            display: block;
            width: 8px;
            height: 8px;
            background: #FFD700;
            border-radius: 50%;
            margin-left: -3px;
        }

        /* ===== 主容器 ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* ===== 标题区 ===== */
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out both;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 印章 */
        .stamp {
            display: inline-block;
            width: 80px;
            height: 80px;
            border: 4px solid #FFD700;
            border-radius: 8px;
            line-height: 72px;
            font-size: 48px;
            color: #FFD700;
            font-weight: 900;
            transform: rotate(-8deg);
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3), inset 0 0 10px rgba(255, 215, 0, 0.1);
            position: relative;
        }
        .stamp::before {
            content: "";
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 4px;
        }

        .year-title {
            font-size: 2.8em;
            color: #FFD700;
            font-weight: 900;
            margin: 10px 0;
            text-shadow:
                0 0 10px rgba(255, 215, 0, 0.8),
                0 0 20px rgba(255, 215, 0, 0.5),
                0 0 40px rgba(255, 165, 0, 0.3),
                2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: breathGlow 3s ease-in-out infinite;
        }

        @keyframes breathGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(255,215,0,0.8), 0 0 20px rgba(255,215,0,0.5), 0 0 40px rgba(255,165,0,0.3), 2px 2px 4px rgba(0,0,0,0.5); }
            50% { text-shadow: 0 0 20px rgba(255,215,0,1), 0 0 40px rgba(255,215,0,0.7), 0 0 60px rgba(255,165,0,0.5), 0 0 80px rgba(255,69,0,0.3), 2px 2px 4px rgba(0,0,0,0.5); }
        }

        .dept-title {
            font-size: 1.4em;
            color: #FFD700;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5), 1px 1px 3px rgba(0,0,0,0.5);
            opacity: 0.95;
        }

        .dept-sub {
            font-size: 1.1em;
            color: rgba(255, 215, 0, 0.8);
            margin-top: 5px;
            letter-spacing: 6px;
            font-weight: 500;
        }

        /* ===== 分割线 ===== */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 25px auto;
            max-width: 600px;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
        }
        .divider-diamond {
            width: 10px;
            height: 10px;
            background: #FFD700;
            transform: rotate(45deg);
            margin: 0 15px;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
        }

        /* ===== 视频区 ===== */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 30px;
        }

        .video-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.4);
            position: relative;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .video-card:nth-child(1) { animation: fadeInUp 0.8s ease-out 0.3s both; }
        .video-card:nth-child(2) { animation: fadeInUp 0.8s ease-out 0.6s both; }

        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.15), 0 0 20px rgba(255, 215, 0, 0.1);
        }

        /* 流光边框 */
        .video-card::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 14px;
            background: linear-gradient(45deg, transparent 30%, rgba(255,215,0,0.6) 50%, transparent 70%);
            background-size: 300% 300%;
            animation: borderGlow 4s linear infinite;
            z-index: -1;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* 中式角花 */
        .video-card::after {
            content: "";
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            border-top: 2px solid #FFD700;
            border-right: 2px solid #FFD700;
            opacity: 0.5;
            pointer-events: none;
        }
        .corner-bl {
            position: absolute;
            bottom: 6px;
            left: 6px;
            width: 24px;
            height: 24px;
            border-bottom: 2px solid #FFD700;
            border-left: 2px solid #FFD700;
            opacity: 0.5;
            pointer-events: none;
        }

        .video-title {
            padding: 12px 20px;
            background: linear-gradient(135deg, #C41E24 0%, #8B0000 100%);
            font-size: 1.15em;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ===== 底部祝福 ===== */
        footer {
            text-align: center;
            padding: 20px 0 10px;
            animation: fadeInUp 0.8s ease-out 0.9s both;
        }

        .blessing {
            font-size: 1.5em;
            color: #FFD700;
            font-weight: 700;
            letter-spacing: 3px;
            text-shadow:
                0 0 10px rgba(255, 215, 0, 0.6),
                0 0 20px rgba(255, 165, 0, 0.3),
                1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .copyright {
            margin-top: 15px;
            font-size: 0.8em;
            color: rgba(255, 215, 0, 0.4);
            letter-spacing: 2px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .lantern { display: none; }
            .year-title { font-size: 2.2em; }
            .dept-title { font-size: 1.2em; }
            .stamp { width: 65px; height: 65px; line-height: 57px; font-size: 38px; }
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            .year-title { font-size: 1.8em; }
            .dept-title { font-size: 1em; letter-spacing: 2px; }
            .dept-sub { font-size: 0.9em; letter-spacing: 3px; }
            .blessing { font-size: 1.1em; letter-spacing: 1px; }
            .stamp { width: 55px; height: 55px; line-height: 47px; font-size: 32px; border-width: 3px; }
            body { padding: 15px 10px; }
        }
    </style>
</head>
<body>
    <!-- Canvas 烟花动画 -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- 左灯笼 -->
    <div class="lantern left">
        <div class="lantern-line"></div>
        <div class="lantern-top"></div>
        <div class="lantern-body"></div>
        <div class="lantern-bottom"></div>
        <div class="lantern-tassel"></div>
    </div>

    <!-- 右灯笼 -->
    <div class="lantern right">
        <div class="lantern-line"></div>
        <div class="lantern-top"></div>
        <div class="lantern-body"></div>
        <div class="lantern-bottom"></div>
        <div class="lantern-tassel"></div>
    </div>

    <div class="container">
        <!-- 标题区 -->
        <header>
            <div class="stamp">马</div>
            <div class="year-title">2026 马年行大运</div>
            <div class="dept-title">SCC 深南电路 华东智能制造推进部</div>
            <div class="dept-sub">部 门 年 会</div>
        </header>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-diamond"></div>
            <div class="divider-line"></div>
        </div>

        <!-- 视频区 -->
        <div class="video-grid">
            <div class="video-card">
                <div class="corner-bl"></div>
                <div class="video-title">精 彩 瞬 间</div>
                <div class="player-wrapper">
                    <iframe
                        src="精彩瞬间.mp4"
                        allowfullscreen
                        allow="autoplay; fullscreen">
                    </iframe>
                </div>
            </div>

            <div class="video-card">
                <div class="corner-bl"></div>
                <div class="video-title">马 年 行 大 运</div>
                <div class="player-wrapper">
                    <iframe
                        src="马年行大运.mp4"
                        allowfullscreen
                        allow="autoplay; fullscreen">
                    </iframe>
                </div>
            </div>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-diamond"></div>
            <div class="divider-line"></div>
        </div>

        <!-- 底部祝福 -->
        <footer>
            <div class="blessing">万马奔腾迎新春 &nbsp; 策马扬鞭再出发</div>
            <div class="copyright">SCC 深南电路 华东智能制造推进部 &copy; 2026</div>
        </footer>
    </div>

    <script>
        // ===== Canvas 烟花 + 粒子动画 =====
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 金色漂浮粒子
        class FloatingParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 5;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedY = Math.random() * 0.6 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.flickerSpeed = Math.random() * 0.02 + 0.01;
                this.flickerPhase = Math.random() * Math.PI * 2;
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                this.flickerPhase += this.flickerSpeed;
                if (this.y < -10) this.reset();
            }
            draw() {
                const flicker = 0.5 + 0.5 * Math.sin(this.flickerPhase);
                const alpha = this.opacity * flicker;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
                ctx.fill();
                // glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 0, ${alpha * 0.15})`;
                ctx.fill();
            }
        }

        // 烟花火箭
        class Rocket {
            constructor() {
                this.x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
                this.y = canvas.height;
                this.targetY = Math.random() * canvas.height * 0.4 + canvas.height * 0.1;
                this.speed = 4 + Math.random() * 3;
                this.hue = Math.random() < 0.5 ? 0 : 45; // 红色或金色
                this.alive = true;
                this.trail = [];
            }
            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 8) this.trail.shift();
                this.y -= this.speed;
                this.x += (Math.random() - 0.5) * 0.5;
                if (this.y <= this.targetY) {
                    this.alive = false;
                }
            }
            draw() {
                // trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = (i / this.trail.length) * 0.5;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${alpha})`;
                    ctx.fill();
                }
                // head
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, 1)`;
                ctx.fill();
            }
        }

        // 烟花爆炸碎片
        class FireworkParticle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue + (Math.random() - 0.5) * 20;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.gravity = 0.04;
                this.friction = 0.98;
                this.opacity = 1;
                this.decay = Math.random() * 0.02 + 0.008;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.opacity -= this.decay;
            }
            draw() {
                if (this.opacity <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 65%, ${this.opacity})`;
                ctx.fill();
                // glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 65%, ${this.opacity * 0.2})`;
                ctx.fill();
            }
        }

        // 初始化粒子
        const floatingParticles = [];
        for (let i = 0; i < 80; i++) {
            floatingParticles.push(new FloatingParticle());
        }

        const rockets = [];
        const fireworkParticles = [];
        let lastFirework = 0;
        const fireworkInterval = () => 1500 + Math.random() * 1500; // 1.5-3秒
        let nextFirework = fireworkInterval();

        function animate(time) {
            // 半透明覆盖实现拖尾残影
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 漂浮粒子
            for (const p of floatingParticles) {
                p.update();
                p.draw();
            }

            // 发射烟花
            if (time - lastFirework > nextFirework) {
                rockets.push(new Rocket());
                lastFirework = time;
                nextFirework = fireworkInterval();
            }

            // 更新火箭
            for (let i = rockets.length - 1; i >= 0; i--) {
                const r = rockets[i];
                r.update();
                r.draw();
                if (!r.alive) {
                    // 爆炸
                    const count = 60 + Math.floor(Math.random() * 40);
                    for (let j = 0; j < count; j++) {
                        fireworkParticles.push(new FireworkParticle(r.x, r.y, r.hue));
                    }
                    rockets.splice(i, 1);
                }
            }

            // 更新碎片
            for (let i = fireworkParticles.length - 1; i >= 0; i--) {
                const p = fireworkParticles[i];
                p.update();
                p.draw();
                if (p.opacity <= 0) {
                    fireworkParticles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
