<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT 上传生成演讲稿</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        #file-input {
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }

        #result {
            margin-top: 30px;
            white-space: pre-wrap;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }

        #loading {
            display: none;
            color: blue;
        }
    </style>
</head>

<body>
    <h2>上传 PPT 生成数字人演讲稿</h2>
    <p>支持 .pptx 文件，上传后自动处理并显示演讲稿</p>

    <input type="file" id="file-input" accept=".pptx,.ppt">
    <button onclick="upload()">上传并生成</button>
    <div id="loading">正在处理 PPT，请稍等（可能需要几秒到一分钟）...</div>

    <pre id="result"></pre>

    <script>
        async function upload() {
            const fileInput = document.getElementById('file-input');
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');

            if (!fileInput.files || fileInput.files.length === 0) {
                alert('请先选择一个 PPT 文件！');
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('data', file);  // 'data' 是您工作流中 binary 的 key

            resultDiv.innerText = '';
            loadingDiv.style.display = 'block';

            try {
                // 把下面这个 URL 替换成您的实际 Webhook URL！！！
                const response = await fetch('http://10.30.43.199:5678/webhook-test/ppt-reflection', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`错误: ${response.status} ${response.statusText}`);
                }

                const text = await response.text();
                resultDiv.innerText = text || '处理完成，但无返回内容（检查 n8n 配置）';
            } catch (error) {
                resultDiv.innerText = '上传失败：' + error.message;
            } finally {
                loadingDiv.style.display = 'none';
            }
        }
    </script>
</body>

</html>
