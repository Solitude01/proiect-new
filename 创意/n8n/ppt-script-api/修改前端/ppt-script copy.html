<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT 转数字人脚本</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .upload-area { border: 2px dashed #ddd; padding: 40px; text-align: center; border-radius: 8px; margin: 20px 0; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: #4CAF50; background: #f9fff9; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; }
        button:disabled { background: #ccc; }

        /* 新增样式 - 多卡片支持 */
        .main-container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header .subtitle { color: #666; font-size: 16px; }
        .add-card-area {
            border: 2px dashed #ddd;
            padding: 30px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: 0.3s;
            background: white;
        }
        .add-card-area:hover { border-color: #4CAF50; background: #f9fff9; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-2px); }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .card-title { font-size: 18px; font-weight: bold; }
        .card-id { font-size: 12px; color: #999; }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            flex: 1;
            padding: 10px 16px;
        }
        .btn.secondary { background: #2196F3; }
        .btn.warning { background: #ff9800; }
        .btn.danger { background: #f44336; }
        .status-box { margin-top: 15px; }
        .status-text { font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.3s;
        }
        .result-preview {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 6px;
            max-height: 100px;
            overflow: hidden;
            margin-top: 10px;
        }
        .result-preview.expanded { max-height: none; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
        }
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { font-size: 18px; font-weight: bold; }
        .modal-body { padding: 20px; overflow-y: auto; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #eee; }
        .modal-content { background: #f4f4f4; padding: 15px; border-radius: 8px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .modal-actions .btn { flex: none; }
        #status-box { margin-top: 20px; display: none; }
        .log-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-uploaded { background: #e3f2fd; color: #1976d2; }
        .status-processing { background: #fff3e0; color: #f57c00; }
        .status-completed { background: #e8f5e9; color: #2e7d32; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <h1>PPT 转数字人脚本生成器</h1>
            <div class="subtitle">上传 PPT 文件，生成数字人演讲脚本，支持多文件并行处理</div>
        </div>

        <div class="add-card-area" onclick="addNewCard()">
            <p>➕ 添加新的处理任务</p>
            <p style="font-size: 14px; color: #666;">点击添加新的卡片，可以同时处理多个 PPT 文件</p>
        </div>

        <div id="cardsContainer" class="grid">
            <!-- Cards will be dynamically added here -->
        </div>

        <div id="emptyState" class="empty-state">
            <p>还没有处理任务</p>
            <p style="font-size: 14px;">点击上方按钮添加新的处理任务</p>
        </div>
    </div>

    <!-- Modal for viewing full content -->
    <div id="modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">查看完整内容</div>
                <button class="btn danger" onclick="closeModal()">关闭</button>
            </div>
            <div class="modal-body">
                <div id="modalContent" class="modal-content"></div>
                <div class="modal-actions">
                    <button class="btn warning" onclick="downloadFullJSON()">下载全部 (JSON)</button>
                    <button class="btn secondary" onclick="downloadScript()">保存演讲稿</button>
                </div>
            </div>
            <div class="modal-footer">
                <span id="modalFileInfo" style="color: #666;"></span>
            </div>
        </div>
    </div>

<script>
    // ⚠️ 这里改成你 NAS 的 IP
    const API_BASE = 'http://10.30.43.199:8090';

    // 全局状态管理
    let cards = new Map(); // cardId -> card data
    let activeModalCardId = null;
    let pollingTimers = new Map(); // cardId -> timer

    // 演示稿字段列表（根据您的数据格式）
    const SCRIPT_FIELDS = ['syllabus', 'slide_1_script', 'slide_2_script', 'slide_3_script', 'slide_4_script',
                          'slide_5_script', 'slide_6_script', 'slide_7_script', 'slide_8_script', 'slide_9_script',
                          'slide_10_script', 'slide_11_script', 'slide_12_script', 'slide_13_script', 'slide_14_script',
                          'slide_15_script', 'slide_16_script', 'slide_17_script', 'slide_18_script', 'slide_19_script'];

    // 初始化 - 添加一个示例卡片
    window.onload = function() {
        addNewCard();
        updateEmptyState();
    };

    // 添加新卡片
    function addNewCard() {
        const cardId = 'card_' + Date.now();
        const cardData = {
            id: cardId,
            fileName: '',
            taskId: null,
            status: 'idle', // idle, uploading, processing, completed, error
            progress: 0,
            data: null,
            error: null,
            pollingTimer: null
        };

        cards.set(cardId, cardData);
        renderCard(cardId);
        updateEmptyState();
        return cardId;
    }

    // 渲染单个卡片
    function renderCard(cardId) {
        const cardData = cards.get(cardId);
        const container = document.getElementById('cardsContainer');

        const cardHtml = `
            <div class="card" id="card-${cardId}">
                <div class="card-header">
                    <div class="card-title">PPT 转数字人脚本</div>
                    <div class="card-id">ID: ${cardId}</div>
                </div>

                <div class="upload-area" onclick="document.getElementById('fileInput-${cardId}').click()">
                    <p>📄 点击选择 PPT 文件 (或拖拽至此)</p>
                    <input type="file" id="fileInput-${cardId}" accept=".pptx" style="display: none"
                           onchange="handleFileSelect('${cardId}', this)">
                    <p class="file-name" id="fileName-${cardId}">未选择文件</p>
                </div>

                <div class="buttons">
                    <button class="btn" id="uploadBtn-${cardId}" onclick="uploadFile('${cardId}')" disabled>开始处理</button>
                    <button class="btn secondary" id="viewBtn-${cardId}" onclick="openModal('${cardId}')" disabled>展开</button>
                    <button class="btn danger" onclick="deleteCard('${cardId}')">删除</button>
                </div>

                <div class="status-box" id="statusBox-${cardId}" style="display: none;">
                    <div class="status-text" id="statusText-${cardId}">准备就绪</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill-${cardId}"></div>
                    </div>
                    <div class="result-preview" id="resultPreview-${cardId}"></div>
                </div>
            </div>
        `;

        container.insertAdjacentHTML('beforeend', cardHtml);
    }

    // 处理文件选择
    function handleFileSelect(cardId, input) {
        const cardData = cards.get(cardId);
        if (input.files.length > 0) {
            cardData.fileName = input.files[0].name;
            document.getElementById(`fileName-${cardId}`).innerText = "已选: " + cardData.fileName;
            document.getElementById(`uploadBtn-${cardId}`).disabled = false;
            updateCardStatus(cardId, 'idle', 0, '文件已选择，点击开始处理');
        }
    }

    // 上传文件
    async function uploadFile(cardId) {
        const cardData = cards.get(cardId);
        const fileInput = document.getElementById(`fileInput-${cardId}`);
        const file = fileInput.files[0];
        if (!file) return;

        // 更新状态
        updateCardStatus(cardId, 'uploading', 0, '正在上传文件...');
        document.getElementById(`uploadBtn-${cardId}`).disabled = true;
        document.getElementById(`uploadBtn-${cardId}`).innerText = "上传中...";

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.task_id) {
                cardData.taskId = result.task_id;
                updateCardStatus(cardId, 'processing', 10, '开始处理，请等待...');
                document.getElementById(`uploadBtn-${cardId}`).innerText = "处理中...";
                document.getElementById(`viewBtn-${cardId}`).disabled = false;

                // 开始轮询状态
                startPolling(cardId);
            } else {
                throw new Error('上传失败: ' + JSON.stringify(result));
            }
        } catch (e) {
            updateCardStatus(cardId, 'error', 0, '上传失败: ' + e.message);
            document.getElementById(`uploadBtn-${cardId}`).disabled = false;
            document.getElementById(`uploadBtn-${cardId}`).innerText = "开始处理";
        }
    }

    // 开始轮询
    function startPolling(cardId) {
        stopPolling(cardId); // 先停止之前的轮询

        const timer = setInterval(async () => {
            try {
                const cardData = cards.get(cardId);
                if (!cardData.taskId) return;

                const res = await fetch(`${API_BASE}/api/status/${cardData.taskId}`);
                const data = await res.json();

                // 更新卡片数据
                cardData.data = data;
                cardData.status = data.status || cardData.status;

                // 根据状态更新进度
                let progress = 0;
                if (data.current_processing_slide && data.total_slides) {
                    progress = Math.round((data.current_processing_slide / data.total_slides) * 90) + 10;
                }

                const statusText = getStatusText(data.status, data.current_processing_slide, data.total_slides);
                updateCardStatus(cardId, data.status, progress, statusText);

                // 如果完成或出错，停止轮询
                if (data.status === 'completed' || data.status === 'error') {
                    stopPolling(cardId);
                    document.getElementById(`uploadBtn-${cardId}`).innerText = "处理完成";
                    document.getElementById(`uploadBtn-${cardId}`).disabled = false;

                    // 显示预览
                    if (data.data) {
                        showResultPreview(cardId, data.data);
                    }
                }
            } catch (e) {
                console.error("轮询失败", e);
            }
        }, 2000);

        pollingTimers.set(cardId, timer);
        cards.get(cardId).pollingTimer = timer;
    }

    // 停止轮询
    function stopPolling(cardId) {
        const timer = pollingTimers.get(cardId);
        if (timer) {
            clearInterval(timer);
            pollingTimers.delete(cardId);
        }
    }

    // 更新卡片状态
    function updateCardStatus(cardId, status, progress, statusText) {
        const cardData = cards.get(cardId);
        cardData.status = status;
        cardData.progress = progress;

        const statusBox = document.getElementById(`statusBox-${cardId}`);
        const statusTextEl = document.getElementById(`statusText-${cardId}`);
        const progressFill = document.getElementById(`progressFill-${cardId}`);

        statusBox.style.display = 'block';
        statusTextEl.innerHTML = `<span class="status-badge status-${status}">${statusText}</span>`;
        progressFill.style.width = progress + '%';
    }

    // 获取状态文本
    function getStatusText(status, slide, total) {
        switch (status) {
            case 'idle': return '准备就绪';
            case 'uploading': return '正在上传文件...';
            case 'processing': return `正在处理幻灯片 ${slide || 1}/${total || '...'}...`;
            case 'completed': return '处理完成 ✓';
            case 'error': return '处理出错 ✗';
            default: return status;
        }
    }

    // 显示结果预览
    function showResultPreview(cardId, data) {
        const preview = document.getElementById(`resultPreview-${cardId}`);

        // 提取所有幻灯片的脚本
        const scriptFields = [];
        for (let i = 1; i <= 20; i++) {
            const field = `slide_${i}_script`;
            if (data[field] && data[field].trim()) {
                scriptFields.push(`Slide ${i}: ${data[field].substring(0, 100)}${data[field].length > 100 ? '...' : ''}`);
            }
        }

        const syllabusPreview = data.syllabus ? `大纲: ${data.syllabus.substring(0, 100)}${data.syllabus.length > 100 ? '...' : ''}` : '';

        preview.innerHTML = `
            <div><strong>文件:</strong> ${data.filename || data.original_name || '未知'}</div>
            <div><strong>总数:</strong> ${data.total_slides || 0} 张幻灯片</div>
            <div><strong>大纲:</strong> ${syllabusPreview}</div>
            <div><strong>脚本:</strong> ${scriptFields.join(' | ')}</div>
        `;
    }

    // 删除卡片
    function deleteCard(cardId) {
        if (!confirm('确定要删除这个处理任务吗？')) return;

        stopPolling(cardId);
        cards.delete(cardId);

        const cardElement = document.getElementById(`card-${cardId}`);
        if (cardElement) {
            cardElement.remove();
        }

        updateEmptyState();
    }

    // 更新空状态显示
    function updateEmptyState() {
        const container = document.getElementById('cardsContainer');
        const emptyState = document.getElementById('emptyState');

        if (cards.size === 0) {
            emptyState.style.display = 'block';
        } else {
            emptyState.style.display = 'none';
        }
    }

    // ============= Modal 功能 =============

    // 打开模态框
    function openModal(cardId) {
        activeModalCardId = cardId;
        const cardData = cards.get(cardId);

        if (!cardData || !cardData.data) {
            alert('还没有处理结果，无法查看');
            return;
        }

        // 显示模态框
        document.getElementById('modal').classList.add('show');

        // 设置文件信息
        const data = cardData.data;
        document.getElementById('modalFileInfo').innerText =
            `文件: ${data.filename || data.original_name || '未知'} | 状态: ${data.status || 'unknown'}`;

        // 显示完整内容
        document.getElementById('modalContent').innerHTML =
            `<pre>${JSON.stringify(data, null, 2)}</pre>`;
    }

    // 关闭模态框
    function closeModal() {
        document.getElementById('modal').classList.remove('show');
        activeModalCardId = null;
    }

    // 下载完整 JSON
    function downloadFullJSON() {
        const cardData = cards.get(activeModalCardId);
        if (!cardData || !cardData.data) {
            alert('没有可下载的数据');
            return;
        }

        const data = cardData.data;
        const filename = data.filename || data.original_name || 'result';
        const jsonStr = JSON.stringify(data, null, 2);

        downloadFile(jsonStr, `${filename}.json`, 'application/json');
    }

    // 下载演讲稿
    function downloadScript() {
        const cardData = cards.get(activeModalCardId);
        if (!cardData || !cardData.data) {
            alert('没有可下载的演讲稿');
            return;
        }

        const data = cardData.data;
        const filename = data.filename || data.original_name || 'script';

        // 提取所有演讲稿内容
        let scriptContent = '';

        // 添加标题
        scriptContent += `PPT 演讲稿\n`;
        scriptContent += `文件名: ${data.filename || data.original_name || '未知'}\n`;
        scriptContent += `总页数: ${data.total_slides || 0}\n\n`;

        // 添加大纲
        if (data.syllabus && data.syllabus.trim()) {
            scriptContent += `=== 大纲 ===\n${data.syllabus}\n\n`;
        }

        // 添加各页脚本
        for (let i = 1; i <= 20; i++) {
            const field = `slide_${i}_script`;
            if (data[field] && data[field].trim()) {
                scriptContent += `=== 第 ${i} 页 ===\n${data[field]}\n\n`;
            }
        }

        // 如果没有脚本内容
        if (scriptContent.trim() === '') {
            scriptContent = '暂无演讲稿内容';
        }

        downloadFile(scriptContent, `${filename}_script.txt`, 'text/plain');
    }

    // 通用下载函数
    function downloadFile(content, filename, mimeType) {
        const blob = new Blob([content], { type: mimeType });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();

        // 清理
        setTimeout(() => {
            URL.revokeObjectURL(url);
            a.remove();
        }, 100);
    }

    // 点击模态框外部关闭
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });
</script>

</body>
</html>
