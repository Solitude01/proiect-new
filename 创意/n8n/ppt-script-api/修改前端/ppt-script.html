<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 演讲稿流水线工厂</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 1200px; margin: 40px auto; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .main-container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
            margin: 0;
            font-weight: 500;
        }
        .add-card-area {
            border: 2px dashed #667eea;
            padding: 30px;
            text-align: center;
            border-radius: 16px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(102, 126, 234, 0.8);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }
        .add-card-area:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.35);
            border-color: #667eea;
            background: rgba(255, 255, 255, 1);
        }
        .add-card-area p:first-child {
            font-size: 1.3em;
            color: #2c3e50;
            margin: 0 0 8px 0;
            font-weight: 600;
        }
        .add-card-area p:last-child {
            font-size: 0.95em;
            color: #7f8c8d;
            margin: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 25px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            border: 1px solid rgba(102, 126, 234, 0.2);
            backdrop-filter: blur(10px);
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.25);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }
        .card-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            letter-spacing: 1px;
        }
        .card-id {
            font-size: 11px;
            color: #95a5a6;
            background: #ecf0f1;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #d5dbdb;
        }
        .upload-area {
            border: 2px dashed #bdc3c7;
            padding: 30px;
            text-align: center;
            border-radius: 14px;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            border-color: #bdc3c7;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: scale(1.02);
        }
        .upload-area p:first-child {
            font-size: 1.1em;
            color: #2c3e50;
            margin: 0 0 10px 0;
            font-weight: 600;
        }
        .file-name {
            font-size: 0.95em;
            color: #27ae60;
            font-weight: 600;
            margin: 8px 0 0 0;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .btn {
            padding: 12px 16px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn.secondary {
            background: linear-gradient(135deg, #48c6ef 0%, #6f86d6 100%);
            color: white;
        }
        .btn.warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .btn.danger {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #2c3e50;
            border: 1px solid #e6b67d;
        }
        .status-box {
            margin: 20px 0;
            padding: 18px;
            border-radius: 14px;
            background: #f8f9ff;
            border: 2px solid #e8eaff;
        }
        .status-text {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 12px;
            color: #2c3e50;
        }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #ecf0f1;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #4facfe);
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .result-preview {
            background: #f0f3ff;
            padding: 12px;
            border-radius: 8px;
            max-height: 120px;
            overflow: auto;
            border: 1px solid #d8e2ff;
        }
        .result-preview.expanded { max-height: none; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(44, 62, 80, 0.8);
            display: none;
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white;
            border-radius: 20px;
            max-width: 900px;
            width: 95%;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        .modal-header {
            padding: 20px 25px;
            border-bottom: 2px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .modal-title {
            font-size: 1.4em;
            font-weight: 700;
            color: white;
        }
        .modal-body {
            padding: 25px;
            overflow-y: auto;
            max-height: 60vh;
        }
        .modal-footer {
            padding: 18px 25px;
            border-top: 2px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
        }
        .modal-content {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e8eaff;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }
        .modal-actions .btn { flex: none; }
        #status-box { margin-top: 20px; display: none; }
        .log-item {
            padding: 12px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-uploaded { background: #e3f2fd; color: #1976d2; }
        .status-processing { background: #fff3e0; color: #f57c00; }
        .status-completed { background: #e8f5e9; color: #2e7d32; }
        .status-error { background: #ffebee; color: #c62828; }
        .status-success { background: #e8f5e9; color: #2e7d32; }
        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            border: 1px solid #e0e0e0;
            font-size: 13px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .empty-state p {
            font-size: 1.1em;
            color: #7f8c8d;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="header">
            <h1>🤖 AI 演讲稿流水线工厂</h1>
            <div class="subtitle">上传 PPT，AI 演讲团队将为您智能生成专业演讲稿，让每一场演讲都精彩纷呈</div>
        </div>

        <div class="add-card-area" onclick="addNewCard()">
            <p>➕ 开启新的演讲制作流程</p>
            <p style="font-size: 14px; color: #666;">点击添加新的任务，我们的 AI 演讲团队随时待命</p>
        </div>

        <div id="cardsContainer" class="grid">
            <!-- 卡片将在处理流程中动态添加 -->
        </div>

        <div id="emptyState" class="empty-state">
            <p>🏭 流水线工厂尚未开启</p>
            <p style="font-size: 14px;">点击上方按钮，开启您的 AI 演讲制作之旅</p>
        </div>
    </div>

    <!-- 演讲稿预览模态框 -->
    <div id="modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">📋 演讲稿详情</div>
                <button class="btn danger" onclick="closeModal()">关闭</button>
            </div>
            <div class="modal-body">
                <div id="modalContent" class="modal-content"></div>
            </div>
            <div class="modal-footer">
                <span id="modalFileInfo" style="color: #666;"></span>
            </div>
        </div>
    </div>

    <!-- 模态框操作按钮（独立区域） -->
    <div id="modalActions" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1001; display: none;">
        <div class="buttons" style="background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <button class="btn warning" onclick="downloadFullJSON()">📥 下载完整数据</button>
            <button class="btn success" onclick="downloadScript()">📄 生成演讲稿</button>
            <button class="btn" onclick="closeModal()">关闭</button>
        </div>
    </div>

<script>
    // ⚠️ 这里改成你 NAS 的 IP
    const API_BASE = 'http://10.30.43.199:8090';

    // 全局状态管理
    let cards = new Map(); // cardId -> card data
    let activeModalCardId = null;
    let pollingTimers = new Map(); // cardId -> timer

    // 演示稿字段列表（根据您的数据格式）
    const SCRIPT_FIELDS = ['syllabus', 'slide_1_script', 'slide_2_script', 'slide_3_script', 'slide_4_script',
                          'slide_5_script', 'slide_6_script', 'slide_7_script', 'slide_8_script', 'slide_9_script',
                          'slide_10_script', 'slide_11_script', 'slide_12_script', 'slide_13_script', 'slide_14_script',
                          'slide_15_script', 'slide_16_script', 'slide_17_script', 'slide_18_script', 'slide_19_script'];

    // 初始化 - 添加一个示例卡片
    window.onload = function() {
        addNewCard();
        updateEmptyState();
    };

    // 添加新卡片
    function addNewCard() {
        const cardId = 'card_' + Date.now();
        const cardData = {
            id: cardId,
            fileName: '',
            taskId: null,
            status: 'idle', // idle, uploading, processing, completed, error
            progress: 0,
            data: null,
            error: null,
            pollingTimer: null,
            scriptDownloaded: false // 标记演讲稿是否已下载
        };

        cards.set(cardId, cardData);
        renderCard(cardId);
        updateEmptyState();
        return cardId;
    }

    // 渲染单个卡片
    function renderCard(cardId) {
        const cardData = cards.get(cardId);
        const container = document.getElementById('cardsContainer');

        const cardHtml = `
            <div class="card" id="card-${cardId}">
                <div class="card-header">
                    <div class="card-title">🎬 AI 演讲稿制作流程</div>
                    <div class="card-id">工单号: ${cardId}</div>
                </div>

                <div class="upload-area" id="uploadArea-${cardId}" onclick="document.getElementById('fileInput-${cardId}').click()">
                    <p>📁 上传您的 PPT 文件（或拖拽至此）</p>
                    <input type="file" id="fileInput-${cardId}" accept=".pptx" style="display: none"
                           onchange="handleFileSelect('${cardId}', this)">
                    <p class="file-name" id="fileName-${cardId}">尚未选择文件</p>
                </div>

                <div class="buttons">
                    <button class="btn primary" id="uploadBtn-${cardId}" onclick="uploadFile('${cardId}')">🚀 开始制作</button>
                    <button class="btn secondary" id="viewBtn-${cardId}" onclick="openModal('${cardId}')">📋 查看详情</button>
                    <button class="btn warning" id="downloadJsonBtn-${cardId}" onclick="downloadJsonFromCard('${cardId}')">📥 下载数据</button>
                    <button class="btn success" id="downloadScriptBtn-${cardId}" onclick="downloadScriptFromCard('${cardId}')">📄 生成演讲稿</button>
                </div>

                <div class="status-box" id="statusBox-${cardId}" style="display: none;">
                    <div class="status-text" id="statusText-${cardId}">准备就绪</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill-${cardId}"></div>
                    </div>
                    <div class="result-preview" id="resultPreview-${cardId}"></div>
                </div>
            </div>
        `;

        container.insertAdjacentHTML('beforeend', cardHtml);
    }

    // 处理文件选择
    function handleFileSelect(cardId, input) {
        const cardData = cards.get(cardId);
        if (input.files.length > 0) {
            cardData.fileName = input.files[0].name;
            document.getElementById(`fileName-${cardId}`).innerText = "已上传: " + cardData.fileName;
            document.getElementById(`uploadBtn-${cardId}`).disabled = false;
            updateCardStatus(cardId, 'idle', 0, '文件已就绪，准备开始制作');

            // 上传文件后，隐藏上传区域，但保留文件名显示
            const uploadArea = document.getElementById(`uploadArea-${cardId}`);
            if (uploadArea) {
                // 只隐藏上传提示文字，保留文件名
                const uploadText = uploadArea.querySelector('p:first-child');
                if (uploadText) {
                    uploadText.style.display = 'none';
                }
            }
        }
    }

    // 上传文件
    async function uploadFile(cardId) {
        const cardData = cards.get(cardId);
        const fileInput = document.getElementById(`fileInput-${cardId}`);
        const file = fileInput.files[0];
        if (!file) return;

        // 更新状态
        updateCardStatus(cardId, 'uploading', 0, '正在上传文件到 AI 演讲团队...');
        document.getElementById(`uploadBtn-${cardId}`).disabled = true;
        document.getElementById(`uploadBtn-${cardId}`).innerText = "📤 上传中...";
        document.getElementById(`downloadJsonBtn-${cardId}`).disabled = true;
        document.getElementById(`downloadScriptBtn-${cardId}`).disabled = true;

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.task_id) {
                cardData.taskId = result.task_id;
                updateCardStatus(cardId, 'processing', 10, 'AI 演讲团队开始工作...');
                document.getElementById(`uploadBtn-${cardId}`).innerText = "⚙️ 制作中...";
                document.getElementById(`viewBtn-${cardId}`).disabled = false;

                // 开始轮询状态
                startPolling(cardId);
            } else {
                throw new Error('上传失败: ' + JSON.stringify(result));
            }
        } catch (e) {
            updateCardStatus(cardId, 'error', 0, '上传出错: ' + e.message);
            document.getElementById(`uploadBtn-${cardId}`).disabled = false;
            document.getElementById(`uploadBtn-${cardId}`).innerText = "🚀 开始制作";
        }
    }

    // 开始轮询
    function startPolling(cardId) {
        stopPolling(cardId); // 先停止之前的轮询

        const timer = setInterval(async () => {
            try {
                const cardData = cards.get(cardId);
                if (!cardData.taskId) return;

                const res = await fetch(`${API_BASE}/api/status/${cardData.taskId}`);
                const data = await res.json();

                // 更新卡片数据
                cardData.data = data;
                cardData.status = data.status || cardData.status;

                // 根据状态更新进度
                let progress = cardData.progress || 0; // 保持当前进度，不重置为0
                if (data.current_processing_slide && data.total_slides) {
                    progress = Math.round((data.current_processing_slide / data.total_slides) * 90) + 10;
                } else {
                    // 根据状态设置合理的进度
                    switch (data.status) {
                        case 'idle':
                            progress = 0;
                            break;
                        case 'uploading':
                            progress = 5;
                            break;
                        case 'pending':
                        case 'queued':
                            progress = 10;
                            break;
                        case 'processing':
                        case 'running':
                        case 'in_progress':
                            progress = 30;
                            break;
                        case 'page_generated':
                        case 'paginated':
                            progress = 50;
                            break;
                        case 'director_finished':
                            progress = 70;
                            break;
                        case 'syllabus_ready':
                            progress = 80;
                            break;
                        case 'completed':
                            progress = 100;
                            break;
                        case 'error':
                        case 'failed':
                            progress = 0;
                            break;
                        default:
                            progress = cardData.progress || 0;
                    }
                }

                const statusText = getStatusText(data.status, data.current_processing_slide, data.total_slides);
                updateCardStatus(cardId, data.status, progress, statusText);

                // 如果完成或出错，停止轮询
                if (data.status === 'completed' || data.status === 'error') {
                    stopPolling(cardId);
                    document.getElementById(`uploadBtn-${cardId}`).innerText = "处理完成";
                    document.getElementById(`uploadBtn-${cardId}`).disabled = false;

                    // 显示预览
                    if (data.data) {
                        showResultPreview(cardId, data.data);
                    }
                }
            } catch (e) {
                console.error("轮询失败", e);
            }
        }, 2000);

        pollingTimers.set(cardId, timer);
        cards.get(cardId).pollingTimer = timer;
    }

    // 停止轮询
    function stopPolling(cardId) {
        const timer = pollingTimers.get(cardId);
        if (timer) {
            clearInterval(timer);
            pollingTimers.delete(cardId);
        }
    }

    // 更新卡片状态
    function updateCardStatus(cardId, status, progress, statusText) {
        const cardData = cards.get(cardId);
        cardData.status = status;
        cardData.progress = progress;

        const statusBox = document.getElementById(`statusBox-${cardId}`);
        const statusTextEl = document.getElementById(`statusText-${cardId}`);
        const progressFill = document.getElementById(`progressFill-${cardId}`);

        statusBox.style.display = 'block';
        statusTextEl.innerHTML = `<span class="status-badge status-${status}">${statusText}</span>`;
        progressFill.style.width = progress + '%';

        // 如果任务处理完成，在展开前的卡片上也显示下载按钮
        const viewBtn = document.getElementById(`viewBtn-${cardId}`);
        const downloadJsonBtn = document.getElementById(`downloadJsonBtn-${cardId}`);
        const downloadScriptBtn = document.getElementById(`downloadScriptBtn-${cardId}`);
        if (status === 'completed' && cardData.data) {
            // 启用展开按钮和下载按钮
            viewBtn.disabled = false;
            downloadJsonBtn.disabled = false;
            downloadScriptBtn.disabled = false;
        }
    }

    // 获取状态文本（使用演讲团队协作隐喻）
    function getStatusText(status, slide, total) {
        switch (status) {
            case 'idle': return '准备就绪';
            case 'uploading': return '正在上传文件到 AI 演讲团队...';
            case 'processing': return `AI 团队正在分析第 ${slide || 1}/${total || '...'} 页内容...`;
            case 'page_generated': return '页面内容已生成，准备交付给策划团队';
            case 'completed': return '🎉 演讲稿制作完成';
            case 'error': return '⚠️ 制作过程出现问题';
            case 'success': return '✅ 制作成功';
            case 'failed': return '❌ 制作失败';
            case 'running': return 'AI 演讲团队正在工作...';
            case 'finished': return '已完成';
            case 'pending': return '等待分配制作任务';
            case 'queued': return '已加入制作队列';
            case 'in_progress': return '制作流程进行中';
            case 'cancelled': return '制作任务已取消';
            case 'timeout': return '制作超时，请稍后重试';
            case 'retrying': return '正在尝试重新制作...';
            case 'paginated': return '页面已分页，等待处理';
            case 'director_finished': return '导演已完成审核';
            case 'syllabus_ready': return '演讲大纲已准备就绪';
            default: return status;
        }
    }

    // 显示结果预览
    function showResultPreview(cardId, data) {
        const preview = document.getElementById(`resultPreview-${cardId}`);

        // 提取所有幻灯片的脚本
        const scriptFields = [];
        for (let i = 1; i <= 20; i++) {
            const field = `slide_${i}_script`;
            if (data[field] && data[field].trim()) {
                scriptFields.push(`第 ${i} 页: ${data[field].substring(0, 100)}${data[field].length > 100 ? '...' : ''}`);
            }
        }

        const syllabusPreview = data.syllabus ? `大纲: ${data.syllabus.substring(0, 100)}${data.syllabus.length > 100 ? '...' : ''}` : '';

        preview.innerHTML = `
            <div><strong>📄 文件:</strong> ${data.filename || data.original_name || '未知'}</div>
            <div><strong>📊 总页数:</strong> ${data.total_slides || 0} 页内容</div>
            <div><strong>📋 大纲:</strong> ${syllabusPreview}</div>
            <div><strong>🎤 演讲稿:</strong> ${scriptFields.join(' | ')}</div>
        `;
    }

    // 删除卡片
    function deleteCard(cardId) {
        if (!confirm('确定要删除这个处理任务吗？')) return;

        stopPolling(cardId);
        cards.delete(cardId);

        const cardElement = document.getElementById(`card-${cardId}`);
        if (cardElement) {
            cardElement.remove();
        }

        updateEmptyState();
    }

    // 更新空状态显示
    function updateEmptyState() {
        const container = document.getElementById('cardsContainer');
        const emptyState = document.getElementById('emptyState');

        if (cards.size === 0) {
            emptyState.style.display = 'block';
        } else {
            emptyState.style.display = 'none';
        }
    }

    // ============= Modal 功能 =============

    // 打开模态框
    function openModal(cardId) {
        activeModalCardId = cardId;
        const cardData = cards.get(cardId);

        if (!cardData || !cardData.data) {
            alert('还没有完整的制作数据，无法查看');
            return;
        }

        // 显示模态框和外部按钮
        document.getElementById('modal').classList.add('show');
        document.getElementById('modalActions').style.display = 'block';

        // 显示文件信息
        const data = cardData.data;
        // data.data 包含实际的文件信息
        const fileData = data.data || data;
        document.getElementById('modalFileInfo').innerText =
            `文件: ${fileData.filename || fileData.original_name || '未知'} | 状态: ${fileData.status || 'unknown'}`;

        // 显示完整内容
        document.getElementById('modalContent').innerHTML =
            `<pre>📋 AI 演讲稿制作详情\n\n${JSON.stringify(data, null, 2)}</pre>`;
    }

    // 关闭模态框
    function closeModal() {
        document.getElementById('modal').classList.remove('show');
        document.getElementById('modalActions').style.display = 'none';
        activeModalCardId = null;
    }

    // 下载完整数据
    function downloadFullJSON() {
        const cardData = cards.get(activeModalCardId);
        if (!cardData || !cardData.data) {
            alert('还没有完整的制作数据，无法下载');
            return;
        }

        const data = cardData.data;
        // data.data 包含实际的文件信息
        const fileData = data.data || data;
        const filename = getOriginalFileName(cardData);
        const jsonStr = JSON.stringify(data, null, 2);

        downloadFile(jsonStr, `${filename}_制作数据.json`, 'application/json');
    }

    // 下载演讲稿
    function downloadScript() {
        const cardData = cards.get(activeModalCardId);
        if (!cardData || !cardData.data) {
            alert('还没有完整的演讲稿，无法下载');
            return;
        }

        const data = cardData.data;
        // data.data 包含实际的文件信息
        const fileData = data.data || data;
        const filename = getOriginalFileName(cardData);

        // 提取所有演讲稿内容，只保存 slide_1_script、slide_2_script 等字段
        let scriptContent = '';

        // 添加标题
        scriptContent += `🤖 AI 演讲稿制作报告\n`;
        scriptContent += `文件名: ${fileData.filename || fileData.original_name || '未知'}\n`;
        scriptContent += `总页数: ${fileData.total_slides || 0} 页\n\n`;

        // 添加大纲
        if (fileData.syllabus && fileData.syllabus.trim()) {
            scriptContent += `📋 演讲大纲\n${fileData.syllabus}\n\n`;
        } else {
            scriptContent += `📋 演讲大纲\n暂无大纲内容\n\n`;
        }

        // 只添加 slide_1_script、slide_2_script 等字段
        let hasAnyScript = false;
        for (let i = 1; i <= 20; i++) {
            const field = `slide_${i}_script`;
            if (fileData[field] && fileData[field].trim()) {
                scriptContent += `🎤 第 ${i} 页演讲稿\n${fileData[field]}\n\n`;
                hasAnyScript = true;
            }
        }

        // 如果没有任何脚本内容，添加提示
        if (!hasAnyScript) {
            scriptContent += `⚠️ 演讲稿内容\n暂无演讲稿内容，请等待制作完成后再试。\n`;
        }

        // 确保至少有一些内容
        if (scriptContent.trim() === '') {
            scriptContent = '暂无演讲稿内容';
        }

        downloadFile(scriptContent, `${filename}_AI演讲稿.txt`, 'text/plain');

        // 标记演讲稿已下载，重新显示上传区域
        cardData.scriptDownloaded = true;
        const uploadArea = document.getElementById(`uploadArea-${activeModalCardId}`);
        if (uploadArea) {
            // 重新显示上传提示文字
            const uploadText = uploadArea.querySelector('p:first-child');
            if (uploadText) {
                uploadText.style.display = 'block';
            }
        }
    }

    // 下载 JSON（从卡片直接下载）
    function downloadJsonFromCard(cardId) {
        const cardData = cards.get(cardId);
        if (!cardData || !cardData.data) {
            alert('还没有完整的制作数据，无法下载');
            return;
        }

        const data = cardData.data;
        // data.data 包含实际的文件信息
        const fileData = data.data || data;
        const filename = getOriginalFileName(cardData);
        const jsonStr = JSON.stringify(data, null, 2);

        downloadFile(jsonStr, `${filename}_制作数据.json`, 'application/json');
    }

    // 下载演讲稿（从卡片直接下载）
    function downloadScriptFromCard(cardId) {
        const cardData = cards.get(cardId);
        if (!cardData || !cardData.data) {
            alert('还没有完整的演讲稿，无法下载');
            return;
        }

        const data = cardData.data;
        // data.data 包含实际的文件信息
        const fileData = data.data || data;
        const filename = getOriginalFileName(cardData);

        // 提取所有演讲稿内容，只保存 slide_1_script、slide_2_script 等字段
        let scriptContent = '';

        // 添加标题
        scriptContent += `🤖 AI 演讲稿制作报告\n`;
        scriptContent += `文件名: ${fileData.filename || fileData.original_name || '未知'}\n`;
        scriptContent += `总页数: ${fileData.total_slides || 0} 页\n\n`;

        // 添加大纲
        if (fileData.syllabus && fileData.syllabus.trim()) {
            scriptContent += `📋 演讲大纲\n${fileData.syllabus}\n\n`;
        } else {
            scriptContent += `📋 演讲大纲\n暂无大纲内容\n\n`;
        }

        // 只添加 slide_1_script、slide_2_script 等字段
        let hasAnyScript = false;
        for (let i = 1; i <= 20; i++) {
            const field = `slide_${i}_script`;
            if (fileData[field] && fileData[field].trim()) {
                scriptContent += `🎤 第 ${i} 页演讲稿\n${fileData[field]}\n\n`;
                hasAnyScript = true;
            }
        }

        // 如果没有任何脚本内容，添加提示
        if (!hasAnyScript) {
            scriptContent += `⚠️ 演讲稿内容\n暂无演讲稿内容，请等待制作完成后再试。\n`;
        }

        // 确保至少有一些内容
        if (scriptContent.trim() === '') {
            scriptContent = '暂无演讲稿内容';
        }

        downloadFile(scriptContent, `${filename}_AI演讲稿.txt`, 'text/plain');

        // 标记演讲稿已下载，重新显示上传区域
        cardData.scriptDownloaded = true;
        const uploadArea = document.getElementById(`uploadArea-${cardId}`);
        if (uploadArea) {
            // 重新显示上传提示文字
            const uploadText = uploadArea.querySelector('p:first-child');
            if (uploadText) {
                uploadText.style.display = 'block';
            }
        }
    }

    // 获取原始文件名（去掉扩展名）
    function getOriginalFileName(cardData) {
        if (!cardData) return 'result';
        // 优先使用用户选择的文件名
        if (cardData.fileName) {
            // 去掉文件扩展名
            return cardData.fileName.replace(/\.[^.]+$/, '');
        }
        // 其次使用服务器返回的数据
        return (cardData.data && (cardData.data.filename || cardData.data.original_name)) || 'result';
    }

    // 通用下载函数
    function downloadFile(content, filename, mimeType) {
        const blob = new Blob([content], { type: mimeType });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();

        // 清理
        setTimeout(() => {
            URL.revokeObjectURL(url);
            a.remove();
        }, 100);
    }

    // 点击模态框外部关闭
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    // 按 ESC 键关闭模态框
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeModal();
        }
    });
</script>
