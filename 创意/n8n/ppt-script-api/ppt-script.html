<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT 转数字人脚本</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .upload-area { border: 2px dashed #ddd; padding: 40px; text-align: center; border-radius: 8px; margin: 20px 0; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: #4CAF50; background: #f9fff9; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; }
        button:disabled { background: #ccc; }
        #status-box { margin-top: 20px; display: none; }
        .log-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-uploaded { background: #e3f2fd; color: #1976d2; }
        .status-processing { background: #fff3e0; color: #f57c00; }
        .status-completed { background: #e8f5e9; color: #2e7d32; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="card">
    <h1>PPT 转数字人脚本生成器</h1>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>📄 点击选择 PPT 文件 (或拖拽至此)</p>
        <input type="file" id="fileInput" accept=".pptx" style="display: none" onchange="handleFileSelect(this)">
        <p id="fileName" style="color: #666; font-size: 14px;"></p>
    </div>

    <button id="uploadBtn" onclick="uploadFile()" disabled>开始处理</button>

    <div id="status-box">
        <h3>🚀 处理进度</h3>
        <div id="statusText" style="margin-bottom: 10px; font-weight: bold;">正在初始化...</div>
        <div id="dataDisplay"></div>
    </div>
</div>

<script>
    // ⚠️ 这里改成你 NAS 的 IP
    const API_BASE = 'http://10.30.43.199:8090'; 
    let currentTaskId = null;
    let pollInterval = null;

    function handleFileSelect(input) {
        if (input.files.length > 0) {
            document.getElementById('fileName').innerText = "已选: " + input.files[0].name;
            document.getElementById('uploadBtn').disabled = false;
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        document.getElementById('uploadBtn').disabled = true;
        document.getElementById('uploadBtn').innerText = "上传中...";

        try {
            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            
            if (result.task_id) {
                currentTaskId = result.task_id;
                document.getElementById('status-box').style.display = 'block';
                document.getElementById('uploadBtn').innerText = "处理中...";
                // 开始轮询状态
                startPolling();
            } else {
                alert('上传失败: ' + JSON.stringify(result));
                resetBtn();
            }
        } catch (e) {
            alert('网络错误: ' + e);
            resetBtn();
        }
    }

    function startPolling() {
        pollInterval = setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/api/status/${currentTaskId}`);
                const data = await res.json();
                
                updateDisplay(data);

                // 如果状态是 completed 或 error，停止轮询
                if (data.status === 'completed' || data.status === 'error') {
                    clearInterval(pollInterval);
                    document.getElementById('uploadBtn').innerText = "处理完成";
                    document.getElementById('uploadBtn').disabled = false;
                }
            } catch (e) {
                console.error("轮询失败", e);
            }
        }, 2000); // 每2秒查一次
    }

    function updateDisplay(data) {
        const statusText = document.getElementById('statusText');
        const dataDisplay = document.getElementById('dataDisplay');
        
        // 更新状态文字
        statusText.innerText = `当前状态: ${data.status} (最后更新: ${data.updated_at || 'N/A'})`;
        
        // 如果有数据内容，展示出来
        if (data.data) {
            // 这里可以根据你的业务逻辑美化显示
            // 比如显示生成的脚本内容
            dataDisplay.innerHTML = `<pre>${JSON.stringify(data.data, null, 2)}</pre>`;
        }
    }

    function resetBtn() {
        document.getElementById('uploadBtn').disabled = false;
        document.getElementById('uploadBtn').innerText = "开始处理";
    }
</script>

</body>
</html>
