version: '3.8'

services:
  # Web应用服务
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_capability_web
    ports:
      - "8443:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - APP_ENV=production
    restart: unless-stopped
    networks:
      - app_network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_capability_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app_network
    depends_on:
      - redis

  # Redis缓存/消息队列
  redis:
    image: redis:7-alpine
    container_name: ai_capability_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - app_network

  # Nginx反向代理（可选，如果需要HTTPS或负载均衡）
  nginx:
    image: nginx:alpine
    container_name: ai_capability_nginx
    ports:
      - "8444:80"
      - "8445:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    restart: unless-stopped
    networks:
      - app_network
    depends_on:
      - web

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge
